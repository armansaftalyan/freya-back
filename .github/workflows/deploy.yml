name: 🚀 Deploy freya-backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🔐 Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_GITHUB }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 159.89.27.153 >> ~/.ssh/known_hosts

      - name: 🔄 Sync files to server
        run: |
          rsync -avz --delete \
            --exclude-from=.rsyncignore \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" \
            ./ root@159.89.27.153:/var/www/freya-back

      - name: 🐳 Laravel deploy (composer + artisan)
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no root@159.89.27.153 << 'EOF'
            set -e

            cd /var/www/freya-back
            sudo chown -R www-data:www-data /var/www/freya-back/storage /var/www/freya-back/bootstrap/cache
            sudo chmod -R 775 /var/www/freya-back/storage /var/www/freya-back/bootstrap/cache

            composer install --no-interaction --prefer-dist --optimize-autoloader

            php artisan key:generate --force
            php artisan optimize

            php artisan config:clear
            php artisan config:cache

            php artisan storage:link || true
          EOF


